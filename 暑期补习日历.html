function render(){{
  var cont=document.getElementById('cals');cont.innerHTML='';
  MONTHS.forEach(function(mo,idx){{
    var m=mo.i,y=mo.y,f=(new Date(y,m-1,1).getDay()+6)%7;
    var days=new Date(y,m,0).getDate();
    var t=f+days,rem=(7-t%7)%7;
    var tbl=document.createElement('table');tbl.id='cal-'+m;
    var h=document.createElement('tr');
    WN.forEach(function(w){{var th=document.createElement('th');th.textContent=w;h.appendChild(th)}});
    var thead=document.createElement('thead');thead.appendChild(h);tbl.appendChild(thead);
    var tb=document.createElement('tbody');var row;
    var c=0;
    function nr(){{row=document.createElement('tr');tb.appendChild(row)}}
    nr();
    var prevDays=new Date(y,m-1,0).getDate();
    for(var i=0;i<f;i++){{
      var td=document.createElement('td');td.className='oth';
      td.innerHTML='<div class=dn>'+(prevDays-f+1+i)+'</div>';row.appendChild(td);c++
    }}
    for(var d=1;d<=days;d++){{
      if(c>0&&c%7==0)nr();c++;
      var td=document.createElement('td');
      td.innerHTML='<div class=dn>'+d+'</div>';
      var key=m+'-'+d;
      if(DATA[key]){{
        DATA[key].slice().sort(function(a,b){{return ts(a[1])-ts(b[1])}}).forEach(function(e){{
          var s=e[0],t=e[1];var ev=document.createElement('div');
          if(s=='备注'){{ev.className='ev n';ev.textContent='📌'+t}}
          else{{var cls=SUBJ[s]||'';ev.className='ev '+cls+(t=='待定'?' t':'');ev.textContent=s+(t=='待定'?'⏳':' '+t)}}
          td.appendChild(ev)
        }})
      }}
      row.appendChild(td);
    }}
    for(var i=0;i<rem;i++){{if(c>0&&c%7==0)nr();c++;var td=document.createElement('td');td.className='oth';td.innerHTML='<div class=dn>'+(i+1)+'</div>';row.appendChild(td)}}
    tbl.appendChild(tb);
    if(idx==defIdx)tbl.className='act';
    cont.appendChild(tbl)
  }})
}}
var defIdx=0,cm=(new Date()).getMonth()+1;MONTHS.forEach(function(m,idx){if(m.i===cm)defIdx=idx});

    document.querySelectorAll('.nav button').forEach(function(b,i){{b.className=i==idx?'act':''}})
  }};

}});
